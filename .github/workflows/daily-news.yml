name: NWNEWS Daily Engine

on:
  schedule:
    - cron: '0 23 * * *' # Every day at 08:00 KST (23:00 UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Engine
        run: |
          node scripts/engine.js
          node scripts/devto_agent_zero_cost.js
        
      - name: Commit and Push
        run: |
          git config --global user.name "Workflow Engine"
          git config --global user.email "workflow@nwnews.ai"
          git add src/data/it.json src/data/devto.json
          git commit -m "chore: Daily News Update" || echo "No changes to commit"
          git push
